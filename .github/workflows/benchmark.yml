name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: bench-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,benchmark]"

      - name: Run benchmark suite
        run: |
          python -m pytest tests/ -k "benchmark or perf" \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            -x -q 2>/dev/null || echo "No benchmark tests found — running timing tests"
          
          # Fallback: run recall timing test
          python -c "
          import time, tempfile, os
          from mind_mem.init_workspace import init as init_workspace
          from mind_mem.block_parser import parse_file
          from mind_mem._recall_core import recall

          ws = tempfile.mkdtemp()
          init_workspace(ws)

          # Create test blocks
          blocks_md = os.path.join(ws, 'decisions', 'test.md')
          with open(blocks_md, 'w') as f:
              for i in range(50):
                  f.write(f'[TEST-{i:03d}]\nType: Decision\n')
                  f.write(f'Statement: Test decision number {i} about topic {chr(65 + i % 26)}\n\n')

          blocks = parse_file(blocks_md)

          # Benchmark recall (signature: recall(workspace, query, limit=...))
          times = []
          for _ in range(10):
              start = time.perf_counter()
              recall(ws, 'test decision topic', limit=10)
              elapsed = (time.perf_counter() - start) * 1000
              times.append(elapsed)

          avg = sum(times) / len(times)
          p95 = sorted(times)[int(len(times) * 0.95)]
          print(f'Recall benchmark: avg={avg:.1f}ms p95={p95:.1f}ms (n={len(times)}, blocks={len(blocks)})')
          assert avg < 500, f'Recall too slow: {avg:.1f}ms (limit: 500ms)'
          print('PASS: Recall performance within bounds')
          "

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 90
          if-no-files-found: ignore
