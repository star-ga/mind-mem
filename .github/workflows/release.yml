name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # ── Code-scanning alerts gate ────────────────────────────────────────────────
  # Block the release if GitHub code-scanning reports any open alert at
  # the moment of tag push. Past releases (v4.0.12) tagged "all green"
  # while two new alerts were live on main; this gate prevents that drift.
  #
  # If you need to ship despite an open alert (deferred / accepted risk),
  # dismiss it via the GitHub Security UI with a documented rationale and
  # then re-push the tag.
  alerts-gate:
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    steps:
      - name: Block release if open code-scanning alerts exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ``--paginate`` walks every page; ``-q`` filters open alerts
          # by their explicit ``state`` field; ``wc -l`` gives an exact
          # count that survives multi-page result sets.
          if ! payload=$(gh api "repos/${{ github.repository }}/code-scanning/alerts" --paginate -q '.[] | select(.state=="open") | .number' 2>err.log); then
            # 403/404 here means code-scanning is not enabled on this
            # repo (or the token cannot read it). In that case we cannot
            # gate — fail open with a clear warning, not silently.
            echo "::warning::code-scanning alerts API not readable; failing open"
            cat err.log
            exit 0
          fi
          count=$(printf '%s\n' "$payload" | grep -c . || true)
          echo "Open code-scanning alerts: ${count}"
          if [ "${count}" -gt 0 ]; then
            echo "::error::Release blocked — ${count} open code-scanning alert(s). Close or dismiss them before tagging."
            gh api "repos/${{ github.repository }}/code-scanning/alerts" --paginate \
              -q '.[] | select(.state=="open") | "  #\(.number) [\(.rule.severity)] \(.rule.id) — \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            exit 1
          fi

  build:
    needs: alerts-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Bake integrity manifest
        # SHA-256 manifest of critical modules, verified at import time
        # in strict mode (MIND_MEM_INTEGRITY=strict). Released wheels
        # carry the manifest; editable installs don't, so dev stays
        # unaffected.
        run: python scripts/build_integrity_manifest.py

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/

  # ── Sigstore provenance signing ───────────────────────────────────────────────
  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: dist
          path: dist/

      - name: Sign distributions with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Upload signed artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist-signed
          path: dist/

  # ── CycloneDX SBOM ─────────────────────────────────────────────────────────
  sbom:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Generate CycloneDX SBOM
        # CycloneDX/gh-python-generate-sbom@v2 crashes on Python 3.12.13
        # with ``ModuleNotFoundError: pkg_resources`` because setuptools
        # dropped that shim. Installing cyclonedx-bom directly + invoking
        # the CLI keeps the output format identical while avoiding the
        # broken action wrapper. Swap back when the action is repaired.
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install "cyclonedx-bom>=5"
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom-release
          path: sbom.cdx.json

  # ── PyPI publish (OIDC trusted publishing) ────────────────────────────────────
  publish-pypi:
    needs: [build, sign]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts (wheel + sdist only)
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          print-hash: true
          # Idempotent: a tag re-push or a local `twine upload` that
          # raced ahead of this workflow leaves the version already on
          # PyPI; treat that as success instead of failing the job
          # with a 400.
          skip-existing: true
          # Attestations (PEP 740) are generated automatically by pypi-publish
          # when id-token: write is present and the package is uploaded from
          # a trusted publisher environment.
          # Intentionally pulls the raw ``dist`` artifact (wheel + sdist
          # only), not ``dist-signed`` — the sign job's ``*.sigstore.json``
          # outputs are for the GitHub release, not PyPI. Twine check in
          # this action rejects anything that isn't a wheel or sdist.

  # ── GitHub Release (dist + SBOM + signatures) ────────────────────────────────
  github-release:
    needs: [build, sign, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download signed dist artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: dist-signed
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: sbom-release
          path: .

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # v3.7.0 M9: dropped ``libmindmem.so`` from the file list. The
        # MIND kernel is built by ``mindc`` (STARGA's internal toolchain)
        # which isn't reproducible on a public GitHub-hosted runner; the
        # release was silently omitting the artifact because no build
        # step produced it. Pure-Python fallback in ``mind_ffi`` returns
        # bit-identical results within f32 epsilon (see README §"MIND
        # kernel not loading"), so the release no longer pretends to
        # ship a precompiled native artifact. Operators who want the
        # perf path compile from source per ``mind/README.md``.
        # ``fail_on_unmatched_files`` is set so a future drift between
        # the file glob and the upload artifacts gates the release
        # rather than passing silently.
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          name: "mind-mem v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          fail_on_unmatched_files: true
          files: |
            dist/*
            sbom.cdx.json
