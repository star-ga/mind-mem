name: Security Review

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  security:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda  # main
        with:
          comment-pr: ${{ github.event_name == 'pull_request' }}
          upload-results: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: claude-opus-4-6
          exclude-directories: node_modules,.venv,__pycache__,dist,build
          claudecode-timeout: "15"
