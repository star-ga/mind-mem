name: mind-mem

networks:
  mindmem-net:
    driver: bridge

volumes:
  postgres-data:
  ollama-models:
  workspace:

services:
  mind-mem:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    image: mind-mem:latest
    container_name: mind-mem
    restart: unless-stopped
    networks:
      - mindmem-net
    ports:
      - "8765:8765"
    volumes:
      - workspace:/workspace
    environment:
      MIND_MEM_WORKSPACE: /workspace
      MIND_MEM_TRANSPORT: http
      # Optional auth token — set in your shell or a .env file:
      # MIND_MEM_TOKEN: changeme
      # MIND_MEM_ADMIN_TOKEN: changeme-admin
      DATABASE_URL: postgresql://mindmem:mindmem@postgres:5432/mindmem
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mind-mem-postgres
    restart: unless-stopped
    networks:
      - mindmem-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: mindmem
      POSTGRES_PASSWORD: mindmem
      POSTGRES_DB: mindmem
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmem -d mindmem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: mind-mem-ollama
    restart: unless-stopped
    networks:
      - mindmem-net
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Uncomment to enable GPU passthrough on hosts with nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
